kind: Deployment
apiVersion: apps/v1
metadata:
  name: mysql
  namespace: expense
  labels:
    component: mysql
    project: expense
    tier: database
spec:
  replicas: 2
  selector:
    matchLabels:
      component: mysql
      project: expense
      tier: database
  template:
    metadata:
      labels:
        component: mysql
        project: expense
        tier: database
    spec:
      containers:
        - name: mysql
          image: tgsmanimohan/mysql:v1.0
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 5
---

kind: Service
apiVersion: v1
metadata:
  name: mysql
  namespace: expense
spec:
  selector:
    component: mysql
    project: expense
    tier: database
  # Define the type of service (ClusterIP, NodePort, LoadBalancer)
  # if type is not specified, it defaults to ClusterIP
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306


